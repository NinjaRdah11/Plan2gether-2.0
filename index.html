<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan2Gether — find where to hang out</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
/* ===== THEME TOKENS (overridden by JS theme picker) ===== */
:root{
  --dusk:#1B1F3B; --dusk-2:#262C52; --dusk-3:#323B6E;
  --accent:#F2A65A; --accent-soft:rgba(242,166,90,0.15);
  --coral:#E8615C;
  --paper:#F6F1E7; --ink:#1B1F3B;
  --mist:#9098C0; --good:#7FBE8F;
  --radius:18px; --radius-sm:10px;
  --card-bg:var(--paper); --card-color:var(--ink);
  --input-bg:#fff; --input-border:#e3ddcd;
  --tag-bg:#fff; --tag-color:#41435c;
  --spot-bg:#fff; --spot-border:#e3ddcd;
  --font-body:'Inter',sans-serif; --font-display:'Fraunces',serif; --font-mono:'JetBrains Mono',monospace;
}
/* Dark-card variant */
body.theme-dark { --card-bg:#1e2240; --card-color:var(--paper); --input-bg:#2a3060; --input-border:#3d4880; --tag-bg:#2a3060; --tag-color:var(--paper); --spot-bg:#232847; --spot-border:#3d4880; }
body.theme-dark .card { box-shadow:0 14px 40px rgba(0,0,0,0.5); }
body.theme-dark label { color:#8890b8; }
body.theme-dark input[type=text],body.theme-dark input[type=number]{ color:var(--paper); }
body.theme-dark .member-row { border-bottom-color:#3d4880; }
body.theme-dark .spot .address,body.theme-dark .spot-desc,body.theme-dark .spot p { color:#9098c0; }

/* Accent colour overrides (set via JS) */
body.accent-purple { --accent:#9B7FEA; --accent-soft:rgba(155,127,234,0.15); }
body.accent-teal   { --accent:#3ECFB2; --accent-soft:rgba(62,207,178,0.15); }
body.accent-coral  { --accent:#E8615C; --accent-soft:rgba(232,97,92,0.15); }
body.accent-amber  { --accent:#F2A65A; --accent-soft:rgba(242,166,90,0.15); }

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  background:
    radial-gradient(circle at 14% 6%,  rgba(242,166,90,0.10), transparent 38%),
    radial-gradient(circle at 86% 94%, rgba(232,97,92,0.10),  transparent 44%),
    var(--dusk);
  color:var(--paper);
  font-family:var(--font-body);
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:28px 16px 72px;
}
.app{ width:100%; max-width:580px; }

/* ---- HEADER ---- */
.header-row{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:26px;
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand .dot{
  width:10px; height:10px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 0 4px var(--accent-soft);
  flex-shrink:0;
}
.brand h1{ font-family:var(--font-display); font-weight:600; font-size:1.5rem; margin:0; }
.brand .tagline{ color:var(--mist); font-size:0.82rem; margin-left:2px; }
.settings-btn{
  background:rgba(255,255,255,0.08); border:1.5px solid rgba(255,255,255,0.12);
  border-radius:10px; padding:7px 11px; cursor:pointer; font-size:1.1rem;
  color:var(--paper); transition:background .15s;
}
.settings-btn:hover{ background:rgba(255,255,255,0.16); }

/* ---- SETTINGS DRAWER ---- */
.settings-drawer{
  background:var(--dusk-2); border:1.5px solid var(--dusk-3);
  border-radius:16px; padding:20px 20px; margin-bottom:18px;
  display:none;
}
.settings-drawer.open{ display:block; }
.settings-drawer h3{
  font-family:var(--font-display); font-size:1rem; font-weight:600;
  margin:0 0 16px; color:var(--paper);
}
.settings-section{ margin-bottom:14px; }
.settings-section:last-child{ margin-bottom:0; }
.settings-section label-s{
  display:block; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.07em;
  color:var(--mist); font-weight:600; margin-bottom:8px;
}
.swatch-row{ display:flex; gap:8px; flex-wrap:wrap; }
.swatch{
  width:30px; height:30px; border-radius:50%; cursor:pointer;
  border:2.5px solid transparent; transition:transform .12s, border-color .12s;
  position:relative;
}
.swatch:hover{ transform:scale(1.12); }
.swatch.active{ border-color:#fff; }
.theme-row{ display:flex; gap:8px; }
.theme-pill{
  padding:6px 14px; border-radius:999px; font-size:0.8rem; font-weight:600;
  cursor:pointer; border:1.5px solid var(--dusk-3); color:var(--mist);
  transition:background .14s, color .14s, border-color .14s;
}
.theme-pill.active{ background:var(--accent); color:#1b1f3b; border-color:var(--accent); }
.slider-row{ display:flex; align-items:center; gap:12px; }
.slider-row input[type=range]{ flex:1; accent-color:var(--accent); }
.slider-val{ font-family:var(--font-mono); font-size:0.82rem; color:var(--accent); min-width:32px; text-align:right; }

/* ---- ROUTE ---- */
.route{ position:relative; padding-left:26px; }
.route::before{
  content:""; position:absolute; left:5px; top:6px; bottom:6px; width:2px;
  background-image:linear-gradient(var(--mist) 60%, transparent 0%);
  background-size:2px 10px; background-repeat:repeat-y; opacity:0.28;
}
.pin{
  position:absolute; left:-2px; width:14px; height:14px;
  border-radius:50% 50% 50% 0; background:var(--accent); transform:rotate(-45deg); top:8px;
  box-shadow:0 0 0 3px rgba(27,31,59,1), 0 0 0 5px var(--accent-soft);
}

/* ---- CARD ---- */
.card{
  background:var(--card-bg); color:var(--card-color);
  border-radius:var(--radius); padding:26px 24px; margin-bottom:18px;
  box-shadow:0 12px 34px rgba(0,0,0,0.22);
  transition:background .3s;
}
.card h2{ font-family:var(--font-display); font-size:1.3rem; font-weight:600; margin:0 0 5px; }
.card p.sub{ margin:0 0 18px; color:#5b5f7a; font-size:0.91rem; line-height:1.5; }

/* ---- HOME CHOICES ---- */
.choices{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.choice-btn{
  border:2px solid var(--input-border); background:var(--input-bg);
  border-radius:14px; padding:20px 16px; text-align:left; cursor:pointer;
  font-family:var(--font-body); transition:border-color .15s, transform .12s, box-shadow .12s;
  position:relative; overflow:hidden;
}
.choice-btn::after{
  content:""; position:absolute; inset:0;
  background:linear-gradient(135deg, var(--accent-soft), transparent);
  opacity:0; transition:opacity .2s;
}
.choice-btn:hover{ border-color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.12); }
.choice-btn:hover::after{ opacity:1; }
.choice-btn .cb-icon{ font-size:1.5rem; margin-bottom:8px; display:block; }
.choice-btn strong{ display:block; font-family:var(--font-display); font-size:1.05rem; margin-bottom:3px; color:var(--card-color); }
.choice-btn span{ color:#6b6f8a; font-size:0.82rem; }

/* ---- FORM ELEMENTS ---- */
label{
  display:block; font-size:0.76rem; text-transform:uppercase; letter-spacing:0.07em;
  color:#7a7e98; font-weight:700; margin:14px 0 6px;
}
label:first-of-type{ margin-top:0; }
input[type=text], input[type=number]{
  width:100%; padding:12px 14px; border-radius:var(--radius-sm);
  border:1.5px solid var(--input-border); background:var(--input-bg);
  font-size:0.97rem; font-family:var(--font-body); color:var(--card-color);
  transition:border-color .15s, box-shadow .15s;
}
input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* ---- AUTOCOMPLETE ---- */
.autocomplete-wrap{ position:relative; }
.autocomplete-list{
  position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:50;
  background:#fff; border:1.5px solid var(--accent); border-radius:var(--radius-sm);
  box-shadow:0 8px 24px rgba(0,0,0,0.14); overflow:hidden; display:none;
}
.autocomplete-list.open{ display:block; }
.ac-item{
  padding:11px 14px; cursor:pointer; font-size:0.9rem; color:var(--ink);
  border-bottom:1px solid #f0ece0; display:flex; align-items:center; gap:10px;
  transition:background .1s;
}
.ac-item:last-child{ border-bottom:none; }
.ac-item:hover, .ac-item.focused{ background:#fff8f0; }
.ac-item .ac-icon{ font-size:1rem; flex-shrink:0; opacity:0.7; }
.ac-item .ac-name{ font-weight:600; }
.ac-item .ac-region{ font-size:0.78rem; color:#8a8ea8; margin-top:1px; }

/* ---- PREFERENCE TAGS ---- */
.tags{ display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
.tag{
  border:1.5px solid var(--input-border); background:var(--tag-bg);
  padding:9px 15px; border-radius:999px; font-size:0.84rem;
  cursor:pointer; color:var(--tag-color); font-weight:500;
  transition:border-color .14s, background .14s, color .14s, transform .1s;
  display:inline-flex; align-items:center; gap:6px;
}
.tag:hover{ border-color:var(--accent); transform:translateY(-1px); }
.tag.active{ background:var(--ink); border-color:var(--ink); color:var(--paper); }
body.theme-dark .tag.active{ background:var(--accent); border-color:var(--accent); color:#1b1f3b; }

/* ---- BUTTONS ---- */
.btn{
  width:100%; border:none; border-radius:12px; padding:14px 18px;
  font-size:0.97rem; font-weight:700; cursor:pointer;
  font-family:var(--font-body); margin-top:18px;
  transition:filter .15s, transform .1s, box-shadow .15s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn:active{ transform:scale(0.98); }
.btn-primary{ background:var(--accent); color:#26203d; box-shadow:0 4px 14px var(--accent-soft); }
.btn-primary:hover{ filter:brightness(1.07); box-shadow:0 6px 20px var(--accent-soft); }
.btn-secondary{ background:var(--dusk); color:var(--paper); }
.btn-secondary:hover{ filter:brightness(1.2); }
.btn:disabled{ opacity:0.4; cursor:not-allowed; filter:none; box-shadow:none; }
.small-link{
  background:none; border:none; color:var(--mist); text-decoration:underline;
  cursor:pointer; font-size:0.83rem; padding:0; margin-top:14px; font-family:var(--font-body);
  transition:color .15s;
}
.small-link:hover{ color:var(--paper); }

/* ---- TICKET ---- */
.ticket{
  border:2px dashed var(--dusk-3); border-radius:16px; padding:20px;
  text-align:center; background:var(--dusk-2); margin-bottom:10px;
  position:relative; overflow:hidden;
}
.ticket::before{
  content:""; position:absolute; inset:0;
  background:radial-gradient(circle at 50% 0%, var(--accent-soft), transparent 65%);
}
.ticket .code{
  font-family:var(--font-mono); font-size:2.2rem; font-weight:700;
  letter-spacing:0.14em; color:var(--accent); position:relative;
}
.ticket .label{ font-size:0.72rem; color:var(--mist); text-transform:uppercase; letter-spacing:0.1em; position:relative; }
.copy-btn{
  background:none; border:1px solid var(--dusk-3); border-radius:7px;
  padding:4px 10px; font-size:0.74rem; color:var(--mist); cursor:pointer;
  margin-top:8px; font-family:var(--font-body); transition:background .14s, color .14s;
  position:relative;
}
.copy-btn:hover{ background:var(--dusk-3); color:var(--paper); }

/* ---- LOBBY ---- */
.member-row{
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 4px; border-bottom:1px solid #ece6d6; gap:10px;
}
.member-row:last-child{ border-bottom:none; }
.member-avatar{
  width:34px; height:34px; border-radius:50%; background:var(--accent-soft);
  border:2px solid var(--accent); display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:0.85rem; color:var(--accent); flex-shrink:0;
  font-family:var(--font-display);
}
.member-info{ flex:1; min-width:0; }
.member-row .who{ font-weight:700; font-size:0.95rem; }
.member-row .meta{ font-size:0.78rem; color:#7a7e98; margin-top:1px; }
.badge{
  font-size:0.7rem; font-weight:700; padding:4px 10px; border-radius:999px;
  text-transform:uppercase; letter-spacing:0.05em; white-space:nowrap;
}
.badge.ready{ background:#e4f3e6; color:#3c8451; }

/* ---- WEATHER ---- */
.weather-strip{
  display:flex; align-items:center; gap:14px; background:var(--dusk-2);
  border-radius:14px; padding:15px 18px; margin-bottom:18px;
  border:1px solid var(--dusk-3);
}
.weather-strip .emoji{ font-size:2rem; flex-shrink:0; }
.weather-strip .wtext strong{ display:block; font-family:var(--font-display); font-size:1.05rem; }
.weather-strip .wtext span{ color:var(--mist); font-size:0.82rem; line-height:1.4; }
.weather-strip .wtemp{
  margin-left:auto; font-family:var(--font-mono); font-size:1.3rem;
  color:var(--accent); font-weight:700;
}

/* ---- SPOT CARDS ---- */
.spots-list{ display:flex; flex-direction:column; gap:10px; }
.spot{
  border:1.5px solid var(--spot-border); border-radius:14px;
  padding:16px 18px; background:var(--spot-bg);
  position:relative;
  transition:border-color .18s, transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.spot:hover{
  border-color:var(--accent);
  transform:translateY(-5px) scale(1.012);
  box-shadow:0 14px 32px rgba(0,0,0,0.13);
  z-index:2;
}
.spot.is-fav{ border-color:var(--accent); background:linear-gradient(135deg, var(--accent-soft) 0%, var(--spot-bg) 60%); }
.spot-rank{
  position:absolute; top:14px; right:14px;
  width:26px; height:26px; border-radius:50%;
  background:var(--accent-soft); border:1.5px solid var(--accent);
  font-family:var(--font-mono); font-size:0.7rem; font-weight:700;
  color:var(--accent); display:flex; align-items:center; justify-content:center;
}
.spot-top{ display:flex; align-items:flex-start; gap:10px; }
.spot-title-block{ flex:1; min-width:0; padding-right:36px; }
.spot .cat{
  font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em;
  color:#a86a2d; font-weight:800; margin-bottom:3px;
  display:flex; align-items:center; gap:4px;
}
.spot h3{ font-family:var(--font-display); margin:0 0 4px; font-size:1.08rem; color:var(--card-color); line-height:1.25; }
.spot .address{ font-size:0.8rem; color:#7a7e98; margin-top:4px; display:flex; align-items:center; gap:5px; }

/* Description slides in on hover */
.spot-desc{
  font-size:0.84rem; color:#52546b; line-height:1.55;
  max-height:0; overflow:hidden; opacity:0; margin-top:0;
  transition:max-height .3s ease, opacity .25s ease, margin-top .25s ease;
}
body.theme-dark .spot-desc{ color:#8890b8; }
.spot:hover .spot-desc{ max-height:140px; opacity:1; margin-top:10px; }

/* Action row */
.spot-actions{
  display:flex; align-items:center; gap:7px; margin-top:12px; flex-wrap:wrap;
}
.action-btn{
  display:inline-flex; align-items:center; gap:5px;
  border:1.5px solid var(--spot-border); background:var(--spot-bg);
  border-radius:999px; padding:5px 13px;
  font-size:0.8rem; font-family:var(--font-body); font-weight:600;
  cursor:pointer; color:#52546b;
  transition:border-color .13s, background .13s, color .13s, transform .1s;
  user-select:none;
}
.action-btn:hover{ transform:translateY(-1px); }
.action-btn.liked{ background:#fce8e7; border-color:var(--coral); color:var(--coral); }
.action-btn.faved{ background:var(--accent-soft); border-color:var(--accent); color:#8a5c1a; }
.action-btn .like-count{ opacity:0.75; font-size:0.76rem; }
.osm-link{
  font-size:0.77rem; color:#9098c0; text-decoration:none;
  margin-left:auto; padding:5px 6px;
  display:inline-flex; align-items:center; gap:4px;
  border-radius:8px; transition:color .13s, background .13s;
}
.osm-link:hover{ color:var(--accent); background:var(--accent-soft); }

/* Fav header */
.fav-header{
  font-family:var(--font-display); font-size:0.88rem; font-weight:700;
  color:var(--accent); margin:4px 0 10px; display:flex; align-items:center; gap:7px;
  text-transform:uppercase; letter-spacing:0.05em;
}
.section-divider{
  border:none; border-top:1.5px dashed var(--spot-border); margin:16px 0 14px;
}

/* ---- LOADING SKELETON ---- */
.skeleton{
  background:linear-gradient(90deg, var(--dusk-2) 25%, var(--dusk-3) 50%, var(--dusk-2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:8px; height:16px; margin-bottom:8px;
}
@keyframes shimmer{ 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skeleton-card{
  background:var(--dusk-2); border-radius:var(--radius); padding:24px;
  margin-bottom:12px; border:1px solid var(--dusk-3);
}

/* ---- MISC ---- */
.error-msg{
  color:#b3413c; background:#fbe7e5; border-radius:10px;
  padding:10px 14px; font-size:0.84rem; margin-top:10px;
  display:flex; align-items:center; gap:8px;
}
.hint{ color:var(--mist); font-size:0.83rem; text-align:center; margin-top:10px; line-height:1.5; }
.search-again-row{ display:flex; gap:10px; }
.search-again-row .btn{ flex:1; margin-top:0; }

/* Progress bar for waiting */
.progress-bar{
  height:3px; border-radius:999px; background:var(--dusk-3);
  margin-top:14px; overflow:hidden;
}
.progress-fill{
  height:100%; border-radius:999px; background:var(--accent);
  animation:progress-pulse 2s ease-in-out infinite;
}
@keyframes progress-pulse{ 0%,100%{width:20%;margin-left:0} 50%{width:60%;margin-left:20%} }

/* Pill counter */
.pill-count{
  display:inline-flex; align-items:center; justify-content:center;
  background:var(--accent); color:#26203d;
  font-size:0.72rem; font-weight:800; font-family:var(--font-mono);
  padding:2px 7px; border-radius:999px; margin-left:6px;
}

@media(max-width:440px){
  .choices{ grid-template-columns:1fr; }
  .row2{ grid-template-columns:1fr; }
  .search-again-row{ flex-direction:column; }
  body{ padding:20px 12px 60px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header-row">
    <div class="brand">
      <div class="dot"></div>
      <h1>Plan2Gether</h1>
      <span class="tagline">— pick a spot</span>
    </div>
    <button class="settings-btn" id="settingsToggle" title="Customise">⚙️</button>
  </div>

  <!-- Settings Drawer -->
  <div class="settings-drawer" id="settingsDrawer">
    <h3>✨ Customise</h3>

    <div class="settings-section">
      <label-s>Accent colour</label-s>
      <div class="swatch-row" id="accentSwatches">
        <div class="swatch active" data-accent="amber"  style="background:#F2A65A;" title="Amber"></div>
        <div class="swatch"        data-accent="purple" style="background:#9B7FEA;" title="Purple"></div>
        <div class="swatch"        data-accent="teal"   style="background:#3ECFB2;" title="Teal"></div>
        <div class="swatch"        data-accent="coral"  style="background:#E8615C;" title="Coral"></div>
      </div>
    </div>

    <div class="settings-section">
      <label-s>Card theme</label-s>
      <div class="theme-row" id="themeButtons">
        <button class="theme-pill active" data-theme="">Light cards</button>
        <button class="theme-pill"        data-theme="dark">Dark cards</button>
      </div>
    </div>

    <div class="settings-section">
      <label-s>Search radius — <span id="radiusLabel">3 km</span></label-s>
      <div class="slider-row">
        <span style="font-size:0.8rem;color:var(--mist)">1km</span>
        <input type="range" id="radiusSlider" min="1" max="15" value="3" step="1">
        <span style="font-size:0.8rem;color:var(--mist)">15km</span>
        <span class="slider-val" id="radiusVal">3</span>
      </div>
    </div>

    <div class="settings-section">
      <label-s>Max results — <span id="resultsLabel">6</span></label-s>
      <div class="slider-row">
        <span style="font-size:0.8rem;color:var(--mist)">3</span>
        <input type="range" id="resultsSlider" min="3" max="12" value="6" step="1">
        <span style="font-size:0.8rem;color:var(--mist)">12</span>
        <span class="slider-val" id="resultsVal">6</span>
      </div>
    </div>
  </div>

  <div class="route" id="route"></div>
</div>

<script>
/* ===================== FIREBASE ===================== */
const firebaseConfig = {
  apiKey: "AIzaSyBQGD2VvJPvYyOS3mgxJIp-uHOamvENoPQ",
  databaseURL: "https://plan2gether-ccf06-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "plan2gether-ccf06",

async function toggleLike(code,spotId){
  const ref=db.ref(`parties/${code}/interactions/likes/${spotId}/${deviceId}`);
  const snap=await ref.get();
  if(snap.exists()) await ref.remove(); else await ref.set(true);
}
async function toggleFav(code,spotId,spotData){
  const ref=db.ref(`parties/${code}/interactions/favs/${spotId}`);
  const snap=await ref.get();
  if(snap.exists()) await ref.remove(); else await ref.set(spotData);
}
function parseInteractions(snap){
  const raw=snap&&snap.val?snap.val():null;
  const likeCounts={}, myLikes=new Set(), favs={};
  if(raw){
    if(raw.likes) for(const [sid,voters] of Object.entries(raw.likes)){
      const v=voters||{};
      likeCounts[sid]=Object.keys(v).length;
      if(v[deviceId]) myLikes.add(sid);
    }
    if(raw.favs) for(const [sid,obj] of Object.entries(raw.favs)) if(obj) favs[sid]=obj;
  }
  return{likeCounts,myLikes,favs};
}

/* ===================== NOMINATIM AUTOCOMPLETE ===================== */
let acDebounce=null;
let acResults=[];
let acFocused=-1;

function initAutocomplete(inputId, listId, onSelect){
  const inp = document.getElementById(inputId);
  const list= document.getElementById(listId);
  if(!inp||!list) return;

  function closeList(){ list.classList.remove('open'); acFocused=-1; }
  function openList(){ if(acResults.length) list.classList.add('open'); }

  inp.addEventListener('input', ()=>{
    clearTimeout(acDebounce);
    const q=inp.value.trim();
    if(q.length<2){ closeList(); return; }
    acDebounce=setTimeout(async ()=>{
      try{
        const r=await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`,
          {headers:{'User-Agent':'Plan2Gether/1.0','Accept-Language':'en'}}
        ).then(r=>r.json());
        acResults=r||[];
        if(!acResults.length){ closeList(); return; }
        list.innerHTML=acResults.map((p,i)=>{
          const addr=p.address||{};
          const name=p.name||p.display_name.split(',')[0];
          const region=[addr.city||addr.town||addr.village, addr.state, addr.country].filter(Boolean).slice(0,2).join(', ');
          const icon = getLocationIcon(p.type||p.class||'');
          return `<div class="ac-item" data-idx="${i}">
            <span class="ac-icon">${icon}</span>
            <div><div class="ac-name">${escapeHtml(name)}</div><div class="ac-region">${escapeHtml(region)}</div></div>
          </div>`;
        }).join('');
        list.querySelectorAll('.ac-item').forEach(item=>{
          item.addEventListener('mousedown', e=>{ e.preventDefault(); });
          item.addEventListener('click', ()=>{
            const idx=parseInt(item.dataset.idx);
            const chosen=acResults[idx];
            const name=chosen.name||chosen.display_name.split(',')[0];
            inp.value=name;
            closeList();
            if(onSelect) onSelect(name, chosen);
          });
        });
        openList();
      }catch(e){ closeList(); }
    }, 280);
  });

  inp.addEventListener('keydown', e=>{
    const items=list.querySelectorAll('.ac-item');
    if(e.key==='ArrowDown'){ e.preventDefault(); acFocused=Math.min(acFocused+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('focused',i===acFocused)); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); acFocused=Math.max(acFocused-1,0); items.forEach((el,i)=>el.classList.toggle('focused',i===acFocused)); }
    else if(e.key==='Enter'&&acFocused>=0){ items[acFocused]&&items[acFocused].click(); }
    else if(e.key==='Escape'){ closeList(); }
  });

  inp.addEventListener('blur', ()=>{ setTimeout(closeList, 150); });
}

function getLocationIcon(type){
  const map={city:'🏙️',town:'🏘️',village:'🌾',suburb:'🏡',neighbourhood:'🏡',park:'🌳',museum:'🏛️',restaurant:'🍽️',cafe:'☕',bar:'🍺',default:'📍'};
  return map[type]||map.default;
}

let lastSuggestions=[];
let resultsCtx=null;

async function screenResults(){
  stopInteractionsListener();
  render(`
    <div class="skeleton-card">
      <div class="skeleton" style="width:40%;height:12px;margin-bottom:12px;"></div>
      <div class="skeleton" style="width:70%;height:20px;margin-bottom:6px;"></div>
      <div class="skeleton" style="width:55%;height:14px;margin-bottom:18px;"></div>
      <div class="skeleton" style="height:60px;border-radius:12px;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:80px;border-radius:12px;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:80px;border-radius:12px;"></div>
    </div>`);

  const party=await getParty(currentCode);
  if(!party){ screenHome(); return; }
  const members=Object.values(party.members||{});
  const [weather,newSpots]=await Promise.all([
    fetchWeather(party.location),
    fetchOSMSpots(party.location, members, await fetchWeather(party.location))
  ]);

  if(party.status!=='done') await updateParty(currentCode,{status:'done'});

  resultsCtx={location:party.location, memberCount:members.length, weather};
  const seen=new Set(); lastSuggestions=[];
  for(const s of newSpots){ if(!seen.has(s.id)){ seen.add(s.id); lastSuggestions.push(s); } }

  interactionsListener=db.ref(`parties/${currentCode}/interactions`).on('value',snap=>{
    if(!resultsCtx) return;
    const {likeCounts,myLikes,favs}=parseInteractions(snap);
    const freshIds=new Set(lastSuggestions.map(s=>s.id));
    for(const [sid,spotObj] of Object.entries(favs)) if(!freshIds.has(sid)){ lastSuggestions.push(spotObj); freshIds.add(sid); }
    renderResultsScreen(likeCounts,myLikes,favs);
  });
}

function renderResultsScreen(likeCounts,myLikes,favs){
  if(!resultsCtx) return;
  const {location,memberCount,weather}=resultsCtx;

  const favSpots   =lastSuggestions.filter(s=>favs[s.id]);
  const nonFavSpots=lastSuggestions.filter(s=>!favs[s.id]);

  const favsSection=favSpots.length?`
    <div class="fav-header">⭐ Pinned by the group</div>
    <div class="spots-list">${favSpots.map((s,i)=>spotCard(s,i+1,likeCounts,myLikes,favs)).join('')}</div>
    <hr class="section-divider">
  `:'';

  const freshSection=nonFavSpots.length
    ? `<div class="spots-list">${nonFavSpots.map((s,i)=>spotCard(s,favSpots.length+i+1,likeCounts,myLikes,favs)).join('')}</div>`
    : favSpots.length
      ? `<p class="hint">All spots are pinned above.</p>`
      : `<p class="sub">No venues found for "<strong>${escapeHtml(location)}</strong>". Try a larger city name or adjust the search radius in ⚙️ settings.</p>`;

  render(`
    <div class="card">
      <h2>Spots in ${escapeHtml(location)}</h2>
      <p class="sub">For ${memberCount} ${memberCount===1?'person':'people'} · Live reactions below 👇</p>
      <div class="weather-strip">
        <div class="emoji">${weather.emoji}</div>
        <div class="wtext">
          <strong>${weather.label}</strong>
          <span>${weather.note}</span>
        </div>
        <div class="wtemp">${weather.temp}°C</div>
      </div>
      ${favsSection}
      ${freshSection}
      ${lastSuggestions.length?`<p class="hint" style="margin-top:14px;">📍 Data from OpenStreetMap · Likes &amp; pins sync in real-time</p>`:''}
    </div>
    <div class="search-again-row">
      <button class="btn btn-primary" id="reSearch">🔄 Search again</button>
      <button class="btn btn-secondary" id="newParty">🆕 New party</button>
    </div>`);

  document.querySelectorAll('.action-btn[data-action]').forEach(btn=>{
    btn.addEventListener('click',async e=>{
      e.stopPropagation();
      const action=btn.dataset.action, sid=btn.dataset.sid;
      const spot=lastSuggestions.find(s=>s.id===sid);
      if(!spot) return;
      btn.disabled=true;
      if(action==='like') await toggleLike(currentCode,sid);
      else if(action==='fav') await toggleFav(currentCode,sid,spot);
      btn.disabled=false;
    });
  });

  document.querySelectorAll('.osm-link').forEach(a=>a.addEventListener('click',e=>e.stopPropagation()));
  document.getElementById('reSearch').onclick=()=>screenResults();
  document.getElementById('newParty').onclick=()=>{
    stopInteractionsListener(); resultsCtx=null;
    localStorage.removeItem('p2g_party_code');
    localStorage.removeItem('p2g_is_leader');
    currentCode=null; screenHome();
  };
}

function spotCard(s,rank,likeCounts,myLikes,favs){
  const likeCount=(likeCounts&&likeCounts[s.id])||0;
  const iLiked=myLikes&&myLikes.has(s.id);
  const faved=favs&&!!favs[s.id];
  const desc=buildDescription(s);
  return `
    <div class="spot${faved?' is-fav':''}" data-id="${escapeHtml(s.id)}">
      <div class="spot-rank">#${rank}</div>
      <div class="spot-top">
        <div class="spot-title-block">
          <div class="cat">${prefIcon(s.prefKey)||'📍'} ${escapeHtml(s.cat)}</div>
          <h3>${escapeHtml(s.name)}</h3>
          ${s.address?`<div class="address">📍 ${escapeHtml(s.address)}</div>`:''}
        </div>
      </div>
      <div class="spot-desc">${escapeHtml(desc)}</div>
      <div class="spot-actions">
        <button class="action-btn${iLiked?' liked':''}" data-action="like" data-sid="${escapeHtml(s.id)}">
          ${iLiked?'❤️':'🤍'} ${iLiked?'Liked':'Like'}${likeCount>0?` <span class="like-count">${likeCount}</span>`:''}
        </button>
        <button class="action-btn${faved?' faved':''}" data-action="fav" data-sid="${escapeHtml(s.id)}">
          ${faved?'⭐ Pinned':'☆ Pin'}
        </button>
        <a class="osm-link" href="${escapeHtml(s.osmUri)}" target="_blank" rel="noopener">↗ Map</a>
      </div>
    </div>`;
}

function buildDescription(s){
  const parts=[];
  if(s.cat)      parts.push(`${s.cat} spot`);
  if(s.hasHours) parts.push('opening hours on OSM');
  if(s.website)  parts.push('has a website');
  if(s.phone)    parts.push('phone listed');
  if(s.address)  parts.push(s.address);
  return parts.length ? parts.join(' · ')+'.' : 'View on OpenStreetMap for full details.';
}

/* ===================== WEATHER ===================== */
async function fetchWeather(location){
  try{
    const g=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(location)}&count=1&language=en&format=json`).then(r=>r.json());
    if(!g.results||!g.results.length) throw new Error('no geo');
    const {latitude,longitude}=g.results[0];
    const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&timezone=auto`).then(r=>r.json());
    return interpretWeather(w.current.weather_code,Math.round(w.current.temperature_2m));
  }catch{
    return{label:'Mild',temp:18,emoji:'⛅',note:"Couldn't load live weather — assuming pleasant conditions.",isOutdoorFriendly:true};
  }
}
function interpretWeather(code,temp){
  const rainy=[51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code);
  const stormy=[95,96,99].includes(code);
  const snowy=[71,73,75,77,85,86].includes(code);
  const cloudy=[1,2,3,45,48].includes(code);
  const clear=code===0;
  let label,emoji,note,isOutdoorFriendly;
  if(stormy){label='Stormy';emoji='⛈️';note='Thunderstorms ahead — indoor spots recommended.';isOutdoorFriendly=false;}
  else if(rainy){label='Rainy';emoji='🌧️';note='Raining — better to stay inside.';isOutdoorFriendly=false;}
  else if(snowy){label='Snowy';emoji='❄️';note='Snow around — cozy indoor spots.';isOutdoorFriendly=false;}
  else if(clear&&temp>=14){label='Clear';emoji='☀️';note='Beautiful out — outdoor spots are a great pick.';isOutdoorFriendly=true;}
  else if(cloudy){label='Cloudy';emoji='⛅';note='Overcast but dry — outdoor is fine.';isOutdoorFriendly=true;}
  else{label='Cool';emoji='🌥️';note='A bit chilly — bundle up if heading outside.';isOutdoorFriendly=temp>=10;}
  return{label,emoji,note,temp,code,isOutdoorFriendly};
}

/* ===================== OSM VENUE LOOKUP ===================== */
const OSM_TAGS={
  chill:      {outdoor:[['leisure','park'],['amenity','biergarten']],         indoor:[['amenity','bar'],['amenity','pub']]},
  romantic:   {outdoor:[['tourism','viewpoint'],['leisure','park']],          indoor:[['amenity','restaurant']]},
  games:      {outdoor:[['leisure','mini_golf'],['leisure','sports_centre']], indoor:[['amenity','arcade'],['leisure','escape_game']]},
  restaurant: {outdoor:[['amenity','restaurant']],                            indoor:[['amenity','restaurant']]},
  coffee:     {outdoor:[['amenity','cafe']],                                  indoor:[['amenity','cafe']]},
  nightlife:  {outdoor:[['amenity','bar'],['amenity','pub']],                 indoor:[['amenity','nightclub'],['amenity','bar']]},
  outdoors:   {outdoor:[['leisure','park'],['leisure','nature_reserve']],     indoor:[['leisure','sports_centre']]},
  culture:    {outdoor:[['tourism','monument']],                              indoor:[['tourism','museum'],['tourism','gallery']]},
};
const UA='Plan2Gether/1.0 (group hangout planner)';

async function geocodeCity(location){
  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(location)}&format=json&limit=1`,
    {headers:{'User-Agent':UA,'Accept-Language':'en'}}).then(r=>r.json());
  if(!r||!r.length) throw new Error('City not found');
  return{lat:parseFloat(r[0].lat),lon:parseFloat(r[0].lon)};
}

async function overpassQuery(lat,lon,tagPairs,radius,limit){
  const conds=tagPairs.map(([k,v])=>{
    const f=v==='*'?`["${k}"]`:`["${k}"="${v}"]`;
    return `node${f}(around:${radius},${lat},${lon});\nway${f}(around:${radius},${lat},${lon});`;
  }).join('\n');
  const q=`[out:json][timeout:15];(\n${conds}\n);out center ${limit} qt;`;
  const r=await fetch('https://overpass-api.de/api/interpreter',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded','User-Agent':UA},
    body:'data='+encodeURIComponent(q)
  }).then(r=>r.json());
  return r.elements||[];
}

function osmElementToSpot(el,cat,prefKey){
  const tags=el.tags||{};
  const name=tags.name||tags['name:en']||null;
  if(!name) return null;
  const lat=el.lat||(el.center&&el.center.lat);
  const lon=el.lon||(el.center&&el.center.lon);
  const addr=[
    tags['addr:street']&&tags['addr:housenumber']
      ?`${tags['addr:street']} ${tags['addr:housenumber']}`
      :tags['addr:street'],
    tags['addr:city']
  ].filter(Boolean).join(', ')||null;
  const osmUri=lat&&lon
    ?`https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=18/${lat}/${lon}`
    :`https://www.openstreetmap.org/search?query=${encodeURIComponent(name)}`;
  return{
    id:String(el.type)+String(el.id),name,cat,prefKey,address:addr,
    website:tags.website||tags['contact:website']||null,
    phone:tags.phone||tags['contact:phone']||null,
    hasHours:!!tags.opening_hours,osmUri
  };
}

async function fetchOSMSpots(location,members,weather){
  const tally={};
  members.forEach(m=>m.prefs.forEach(p=>{tally[p]=(tally[p]||0)+1;}));
  let prefs=Object.keys(tally).sort((a,b)=>tally[b]-tally[a]);
  if(!prefs.length) prefs=['chill'];

  let centre;
  try{ centre=await geocodeCity(location); }catch{ return []; }

  const bias=weather.isOutdoorFriendly?'outdoor':'indoor';
  const seen=new Set(), results=[];
  const radiusM=settings.radius*1000;
  const maxResults=settings.results;

  for(const pref of prefs.slice(0,3)){
    if(results.length>=maxResults) break;
    const tagDef=OSM_TAGS[pref]||OSM_TAGS.chill;
    try{
      const els=await overpassQuery(centre.lat,centre.lon,tagDef[bias],radiusM,maxResults*2);
      for(const el of els){
        const spot=osmElementToSpot(el,prettyPref(pref),pref);
        if(!spot||seen.has(spot.id)) continue;
        seen.add(spot.id); results.push(spot);
        if(results.length>=maxResults) break;
      }
    }catch(e){ console.error('Overpass failed for',pref,e); }
  }
  return results.slice(0,maxResults);
}

(async function boot(){
  if(!firebaseReady){ render(''); return; }
  if(currentCode){
    const isLeader=localStorage.getItem('p2g_is_leader')==='1';
    const party=await getParty(currentCode);
    if(party&&party.members&&party.members[deviceId]){
      if(party.status==='searching'||party.status==='done') screenResults();
      else screenLobby(isLeader);
      return;
    }
  }
  screenHome();
})();
